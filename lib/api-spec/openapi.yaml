openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ditto Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: ditto
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ditto/session:
    get:
      operationId: getSession
      tags: [ditto]
      summary: Session status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"

  /ditto/balance:
    get:
      operationId: getBalance
      tags: [ditto]
      summary: Account balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"

  /ditto/user/{uid}:
    get:
      operationId: getUserByUid
      tags: [ditto]
      summary: Gift history by UID
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLookup"

  /ditto/user/{uid}/profile:
    get:
      operationId: getUserProfile
      tags: [ditto]
      summary: Full user profile
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /ditto/search:
    get:
      operationId: searchUsers
      tags: [ditto]
      summary: Search users by name or erbanNo
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"

  /ditto/trtc-token:
    post:
      operationId: getTrtcToken
      tags: [ditto]
      summary: Get TRTC token for a room (works without geo restriction, even with expired ticket)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId]
              properties:
                roomId:
                  type: string
                type:
                  type: string
                  default: "1"
                channel:
                  type: string
                  default: "1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrtcTokenResult"

  /ditto/rooms:
    get:
      operationId: getRooms
      tags: [ditto]
      summary: Live rooms list
      parameters:
        - name: tab
          in: query
          schema:
            type: string
            default: POPULAR
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomList"

  /ditto/explore:
    get:
      operationId: getExplore
      tags: [ditto]
      summary: Explore page data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploreResult"

  /ditto/worker/status:
    get:
      operationId: getWorkerStatus
      tags: [ditto]
      summary: Worker connection status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SessionStatus:
      type: object
      properties:
        uid:
          type: ["string", "null"]
        ticket_prefix:
          type: ["string", "null"]
        ticket_age_min:
          type: ["integer", "null"]
        ticket_valid_for_min:
          type: ["integer", "null"]
        ticket_expired:
          type: boolean
      required: [ticket_expired]

    Balance:
      type: object
      properties:
        goldNum:
          type: number
        diamondNum:
          type: number
        coin:
          type: integer
        uid:
          type: integer
        ok:
          type: boolean
      required: [ok]

    GiftEntry:
      type: object
      properties:
        giftId:
          type: integer
        giftName:
          type: string
        num:
          type: ["integer", "null"]
        icon:
          type: ["string", "null"]
      required: [giftId, giftName]

    UserLookup:
      type: object
      properties:
        uid:
          type: string
        totalGiftsNum:
          type: ["integer", "null"]
        totalGiftTypes:
          type: ["integer", "null"]
        topGifts:
          type: array
          items:
            $ref: "#/components/schemas/GiftEntry"
        profile:
          type: ["object", "null"]
          additionalProperties: true
        workerUsed:
          type: boolean
        source:
          type: string
      required: [uid, topGifts, workerUsed, source]

    UserProfile:
      type: object
      properties:
        ok:
          type: boolean
        uid:
          type: string
        nickname:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        signature:
          type: ["string", "null"]
        erbanNo:
          type: ["string", "integer", "null"]
        fansNum:
          type: ["integer", "null"]
        followNum:
          type: ["integer", "null"]
        level:
          type: ["integer", "null"]
        diamond:
          type: ["number", "null"]
        online:
          type: ["boolean", "null"]
        gender:
          type: ["integer", "null"]
        countryCode:
          type: ["string", "null"]
        countryName:
          type: ["string", "null"]
        countryIcon:
          type: ["string", "null"]
        vipLevel:
          type: ["integer", "null"]
        vipName:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        workerUsed:
          type: boolean
        workerNeeded:
          type: boolean
        raw:
          type: ["object", "null"]
          additionalProperties: true
      required: [ok, uid, workerUsed, workerNeeded]

    SearchResult:
      type: object
      properties:
        ok:
          type: boolean
        users:
          type: array
          items:
            $ref: "#/components/schemas/SearchUser"
        workerUsed:
          type: boolean
        workerNeeded:
          type: boolean
        error:
          type: ["string", "null"]
      required: [ok, users, workerUsed, workerNeeded]

    SearchUser:
      type: object
      properties:
        uid:
          type: ["string", "integer", "null"]
        nickname:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        erbanNo:
          type: ["string", "null"]
        fansNum:
          type: ["integer", "null"]
        level:
          type: ["integer", "null"]
      required: []

    Room:
      type: object
      properties:
        roomId:
          type: ["integer", "string", "null"]
        roomName:
          type: ["string", "null"]
        cover:
          type: ["string", "null"]
        onlineNum:
          type: ["integer", "null"]
        uid:
          type: ["integer", "string", "null"]
        nick:
          type: ["string", "null"]
        erbanNo:
          type: ["integer", "string", "null"]
        countryCode:
          type: ["string", "null"]
        countryName:
          type: ["string", "null"]
        countryIcon:
          type: ["string", "null"]
        vipLevel:
          type: ["integer", "null"]
        vipName:
          type: ["string", "null"]
        gender:
          type: ["integer", "null"]
        roomDesc:
          type: ["string", "null"]
        hotScore:
          type: ["integer", "null"]
      required: []

    RoomList:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"
        total:
          type: ["integer", "null"]
        ok:
          type: boolean
      required: [rooms, ok]

    ExploreResult:
      type: object
      properties:
        ok:
          type: boolean
        raw:
          type: object
          additionalProperties: true
      required: [ok]

    TrtcTokenResult:
      type: object
      properties:
        ok:
          type: boolean
        token:
          type: ["string", "null"]
        privateMapKey:
          type: ["string", "null"]
        channel:
          type: ["integer", "null"]
      required: [ok]

    WorkerStatus:
      type: object
      properties:
        connected:
          type: boolean
        pendingJobs:
          type: integer
        lastPollAgo:
          type: ["integer", "null"]
      required: [connected, pendingJobs]
